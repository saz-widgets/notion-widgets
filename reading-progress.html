<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading Progress</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .widget {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* --- collapsible inputs section --- */
    .inputs-wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      max-height: 300px;
      opacity: 1;
      transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease;
    }

    .inputs-wrap.hidden {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      margin: 0;
    }

    .inputs {
      display: flex;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .editable-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b9b9b;
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      cursor: text;
      padding: 0;
      font-family: inherit;
    }

    .editable-label:hover { color: #6b6b6b; }
    .editable-label:focus {
      color: #1a1a1a;
      border-bottom: 1.5px dashed #ccc;
    }

    input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 1; }

    input[type="number"]:focus {
      border-color: #6b6b6b;
      background: #fff;
    }

    /* --- color row --- */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-row-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b9b9b;
      white-space: nowrap;
    }

    .swatch-list {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      flex: 1;
    }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: #1a1a1a; }

    /* custom color picker swatch */
    .swatch-custom {
      position: relative;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #e0e0e0;
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      flex-shrink: 0;
      transition: transform 0.15s;
      overflow: hidden;
    }

    .swatch-custom:hover { transform: scale(1.15); }

    .swatch-custom input[type="color"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      padding: 0;
      border: none;
    }

    .hint {
      font-size: 10px;
      color: #d0d0d0;
      text-align: right;
      margin-top: -6px;
    }

    /* --- bar --- */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-track {
      flex: 1;
      height: 10px;
      background: #ebebeb;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.25s ease;
    }

    .pct-label {
      font-size: 13px;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      transition: color 0.25s ease;
    }

    /* --- bottom row --- */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .count-unit {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: #b0b0b0;
    }

    .editable-unit {
      font-size: 12px;
      color: #b0b0b0;
      border: none;
      background: transparent;
      outline: none;
      cursor: text;
      font-family: inherit;
      width: 72px;
    }

    .editable-unit:focus {
      color: #6b6b6b;
      border-bottom: 1.5px dashed #ccc;
    }

    /* --- toggle button --- */
    .toggle-btn {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #c0c0c0;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .toggle-btn:hover {
      color: #6b6b6b;
      border-color: #b0b0b0;
    }
  </style>
</head>
<body>
  <div class="widget">

    <!-- collapsible inputs -->
    <div class="inputs-wrap hidden" id="inputs-wrap">

      <div class="inputs">
        <div class="field">
          <input class="editable-label" id="label-read" type="text" value="Pages Read" maxlength="30" />
          <input type="number" id="read" min="0" placeholder="e.g. 120" />
        </div>
        <div class="field">
          <input class="editable-label" id="label-total" type="text" value="Total Pages" maxlength="30" />
          <input type="number" id="total" min="1" placeholder="e.g. 350" />
        </div>
      </div>

      <!-- color picker -->
      <div class="color-row">
        <span class="color-row-label">Bar color</span>
        <div class="swatch-list" id="swatch-list">
          <!-- swatches injected by JS -->
        </div>
      </div>

      <p class="hint">click any label to rename it</p>
    </div>

    <!-- bar -->
    <div>
      <div class="bar-row">
        <div class="bar-track">
          <div class="bar-fill" id="bar"></div>
        </div>
        <span class="pct-label" id="pct">0%</span>
      </div>
      <div class="bottom-row">
        <div class="count-unit">
          <span id="count-text"></span>
          <input class="editable-unit" id="unit-label" type="text" value="pages" maxlength="20" />
        </div>
        <button class="toggle-btn" id="toggle-btn">update</button>
      </div>
    </div>

  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const bookKey = "rp_" + (params.get("book") || "default");

    const totalInput = document.getElementById("total");
    const readInput  = document.getElementById("read");
    const bar        = document.getElementById("bar");
    const pct        = document.getElementById("pct");
    const countText  = document.getElementById("count-text");
    const labelTotal = document.getElementById("label-total");
    const labelRead  = document.getElementById("label-read");
    const unitLabel  = document.getElementById("unit-label");
    const inputsWrap = document.getElementById("inputs-wrap");
    const toggleBtn  = document.getElementById("toggle-btn");
    const swatchList = document.getElementById("swatch-list");

    const PRESETS = [
      "#1a1a1a", "#6b6b6b", "#b0b0b0",
      "#e05c5c", "#e08c3a", "#d4b83a",
      "#5caa6b", "#4a90c4", "#7b68c8",
      "#c46a9a"
    ];

    let currentColor = "#1a1a1a";

    // Build swatches
    PRESETS.forEach(color => {
      const s = document.createElement("div");
      s.className = "swatch";
      s.style.background = color;
      s.title = color;
      s.addEventListener("click", () => setColor(color, true));
      swatchList.appendChild(s);
    });

    // Custom color swatch
    const customWrap = document.createElement("div");
    customWrap.className = "swatch-custom";
    customWrap.title = "Custom color";
    const colorInput = document.createElement("input");
    colorInput.type = "color";
    colorInput.value = currentColor;
    colorInput.addEventListener("input", () => setColor(colorInput.value, true));
    customWrap.appendChild(colorInput);
    swatchList.appendChild(customWrap);

    function setColor(color, save_) {
      currentColor = color;
      bar.style.backgroundColor = color;
      pct.style.color = color;
      colorInput.value = color;
      // update active swatch highlight
      swatchList.querySelectorAll(".swatch").forEach(s => {
        s.classList.toggle("active", s.style.background === color || s.style.backgroundColor === color);
      });
      if (save_) save();
    }

    // Load saved values
    const saved = JSON.parse(localStorage.getItem(bookKey) || "{}");
    if (saved.total)      totalInput.value = saved.total;
    if (saved.read)       readInput.value  = saved.read;
    if (saved.labelTotal) labelTotal.value = saved.labelTotal;
    if (saved.labelRead)  labelRead.value  = saved.labelRead;
    if (saved.unit)       unitLabel.value  = saved.unit;
    setColor(saved.color || "#1a1a1a", false);
    update();

    // Toggle
    let inputsVisible = false;
    toggleBtn.addEventListener("click", () => {
      inputsVisible = !inputsVisible;
      inputsWrap.classList.toggle("hidden", !inputsVisible);
      toggleBtn.textContent = inputsVisible ? "hide update" : "update";
    });

    [totalInput, readInput].forEach(el =>
      el.addEventListener("input", () => { save(); update(); }));
    [labelTotal, labelRead, unitLabel].forEach(el =>
      el.addEventListener("input", () => { save(); update(); }));

    function save() {
      localStorage.setItem(bookKey, JSON.stringify({
        total:      totalInput.value,
        read:       readInput.value,
        labelTotal: labelTotal.value,
        labelRead:  labelRead.value,
        unit:       unitLabel.value,
        color:      currentColor
      }));
    }

    function update() {
      const total   = parseInt(totalInput.value) || 0;
      const read    = Math.min(parseInt(readInput.value) || 0, total);
      const percent = total > 0 ? Math.round((read / total) * 100) : 0;

      bar.style.width = percent + "%";
      pct.textContent = percent + "%";

      if (total > 0) {
        countText.textContent = `${read} of ${total} `;
        unitLabel.style.visibility = "visible";
      } else {
        countText.textContent = "";
        unitLabel.style.visibility = "hidden";
      }
    }
  </script>
</body>
</html>
